<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - Toolify</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        .upload-area:hover {
            background: #f8f9ff;
        }
        #fileInput {
            display: none;
        }
        .file-list {
            margin: 1.5rem 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: #f8f9ff;
            margin: 0.5rem 0;
            border-radius: 5px;
        }
        .file-item button {
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
        }
        .remove-btn {
            background: #ff4444;
        }
        .remove-btn:hover {
            background: #cc0000;
        }
        .move-btn {
            background: #667eea;
            margin: 0 0.3rem;
        }
        .progress {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            margin: 1rem 0;
            overflow: hidden;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="tool-container">
        <a href="index.html" class="back-btn">← Back to Tools</a>
        <h1>📄 PDF Merger</h1>
        <p>Combine multiple PDF files into one document. Drag and drop to reorder.</p>
        
        <div class="upload-area" id="uploadArea">
            <div style="font-size: 3rem;">📁</div>
            <h3>Drop PDF files here or click to browse</h3>
            <p>Select multiple PDF files</p>
        </div>
        
        <input type="file" id="fileInput" accept=".pdf" multiple>
        
        <div class="file-list" id="fileList"></div>
        
        <button id="mergeBtn" onclick="mergePDFs()" disabled>Merge PDFs</button>
        
        <div class="progress" id="progress">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <script>
        let pdfFiles = [];
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8eaff';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '';
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        
        function handleFiles(files) {
            for (let file of files) {
                if (file.type === 'application/pdf') {
                    pdfFiles.push(file);
                }
            }
            updateFileList();
        }
        
        function updateFileList() {
            const fileList = document.getElementById('fileList');
            const mergeBtn = document.getElementById('mergeBtn');
            
            fileList.innerHTML = '';
            
            if (pdfFiles.length === 0) {
                fileList.innerHTML = '<p style="text-align:center;color:#999;">No PDF files added yet</p>';
            }
            
            pdfFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span>📄 ${file.name}</span>
                    <div>
                        ${index > 0 ? `<button class="move-btn" onclick="moveFile(${index}, -1)">↑</button>` : ''}
                        ${index < pdfFiles.length - 1 ? `<button class="move-btn" onclick="moveFile(${index}, 1)">↓</button>` : ''}
                        <button class="remove-btn" onclick="removeFile(${index})">✕</button>
                    </div>
                `;
                fileList.appendChild(item);
            });
            
            mergeBtn.disabled = pdfFiles.length < 2;
        }
        
        function moveFile(index, direction) {
            const newIndex = index + direction;
            const temp = pdfFiles[index];
            pdfFiles.splice(index, 1);
            pdfFiles.splice(newIndex, 0, temp);
            updateFileList();
        }
        
        function removeFile(index) {
            pdfFiles.splice(index, 1);
            updateFileList();
        }
        
        async function mergePDFs() {
            if (pdfFiles.length < 2) return;
            
            const progress = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            progress.style.display = 'block';
            progressFill.style.width = '0%';
            
            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                
                for (let i = 0; i < pdfFiles.length; i++) {
                    const arrayBuffer = await pdfFiles[i].arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach(page => mergedPdf.addPage(page));
                    
                    progressFill.style.width = ((i + 1) / pdfFiles.length * 100) + '%';
                }
                
                const mergedPdfBytes = await mergedPdf.save();
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'merged_document.pdf';
                a.click();
                
                setTimeout(() => {
                    progress.style.display = 'none';
                }, 2000);
                
            } catch (error) {
                alert('Error merging PDFs: ' + error.message);
                progress.style.display = 'none';
            }
        }
    </script>
</body>
</html>
