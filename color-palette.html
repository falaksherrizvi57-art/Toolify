<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator - Toolify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .palette-display {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }
        .color-box {
            height: 150px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s;
        }
        .color-box:hover {
            transform: translateY(-5px);
        }
        .color-code {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.5rem;
            text-align: center;
            border-radius: 0 0 10px 10px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        #baseColor {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .harmony-btns {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .harmony-btn {
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            color: #333;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .harmony-btn.active {
            border-color: #667eea;
            background: #e8eaff;
        }
        .color-values {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .color-value-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #f8f9ff;
            border-radius: 5px;
            font-family: monospace;
        }
        .color-swatch {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }
        .saved-palettes {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }
        .mini-palette {
            display: flex;
            height: 40px;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
        }
        .mini-color {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="tool-container">
        <a href="index.html" class="back-btn">← Back to Tools</a>
        <h1>🎨 Color Palette Generator</h1>
        <p>Generate beautiful color palettes for your projects.</p>
        
        <div class="controls">
            <input type="color" id="baseColor" value="#667eea" onchange="generatePalette()">
            <div class="harmony-btns">
                <button class="harmony-btn active" onclick="setHarmony('analogous', this)">Analogous</button>
                <button class="harmony-btn" onclick="setHarmony('complementary', this)">Complementary</button>
                <button class="harmony-btn" onclick="setHarmony('triadic', this)">Triadic</button>
                <button class="harmony-btn" onclick="setHarmony('monochromatic', this)">Monochromatic</button>
                <button class="harmony-btn" onclick="setHarmony('random', this)">Random</button>
            </div>
            <button onclick="savePalette()">💾 Save</button>
            <button onclick="exportPalette()">📋 Export CSS</button>
        </div>
        
        <div class="palette-display" id="paletteDisplay"></div>
        
        <div class="color-values" id="colorValues"></div>
        
        <h3 style="margin-top: 2rem;">Saved Palettes</h3>
        <div class="saved-palettes" id="savedPalettes"></div>
    </div>

    <script>
        let currentPalette = [];
        let currentHarmony = 'analogous';
        let savedPalettesList = JSON.parse(localStorage.getItem('palettes') || '[]');
        
        function setHarmony(harmony, btn) {
            currentHarmony = harmony;
            document.querySelectorAll('.harmony-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            generatePalette();
        }
        
        function generatePalette() {
            const baseColor = document.getElementById('baseColor').value;
            currentPalette = generateColors(baseColor, currentHarmony);
            displayPalette();
        }
        
        function generateColors(hex, type) {
            const hsl = hexToHSL(hex);
            let colors = [];
            
            switch(type) {
                case 'analogous':
                    for (let i = 0; i < 5; i++) {
                        colors.push(hslToHex((hsl.h + i * 30) % 360, hsl.s, hsl.l));
                    }
                    break;
                case 'complementary':
                    colors = [hex, hslToHex(hsl.h, hsl.s, hsl.l - 10), 
                              hslToHex((hsl.h + 180) % 360, hsl.s, hsl.l),
                              hslToHex((hsl.h + 180) % 360, hsl.s - 20, hsl.l + 10),
                              hslToHex(hsl.h, hsl.s - 30, hsl.l + 20)];
                    break;
                case 'triadic':
                    colors = [hex, hslToHex((hsl.h + 120) % 360, hsl.s, hsl.l),
                              hslToHex((hsl.h + 240) % 360, hsl.s, hsl.l),
                              hslToHex(hsl.h, hsl.s - 20, hsl.l + 10),
                              hslToHex(hsl.h, hsl.s + 20, hsl.l - 10)];
                    break;
                case 'monochromatic':
                    for (let i = -2; i <= 2; i++) {
                        colors.push(hslToHex(hsl.h, hsl.s, hsl.l + i * 15));
                    }
                    break;
                case 'random':
                    colors = [hex];
                    for (let i = 0; i < 4; i++) {
                        colors.push('#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'));
                    }
                    break;
                default:
                    colors = [hex, '#000000', '#ffffff', '#cccccc', '#999999'];
            }
            return colors;
        }
        
        function displayPalette() {
            const display = document.getElementById('paletteDisplay');
            const values = document.getElementById('colorValues');
            
            display.innerHTML = '';
            values.innerHTML = '';
            
            currentPalette.forEach(color => {
                const box = document.createElement('div');
                box.className = 'color-box';
                box.style.backgroundColor = color;
                box.innerHTML = `<div class="color-code">${color}</div>`;
                box.onclick = () => {
                    navigator.clipboard.writeText(color);
                    alert('Copied: ' + color);
                };
                display.appendChild(box);
                
                const valueItem = document.createElement('div');
                valueItem.className = 'color-value-item';
                valueItem.innerHTML = `
                    <div class="color-swatch" style="background:${color}"></div>
                    <span>${color}</span>
                `;
                values.appendChild(valueItem);
            });
        }
        
        function savePalette() {
            savedPalettesList.unshift([...currentPalette]);
            if (savedPalettesList.length > 12) savedPalettesList.pop();
            localStorage.setItem('palettes', JSON.stringify(savedPalettesList));
            displaySavedPalettes();
        }
        
        function displaySavedPalettes() {
            const container = document.getElementById('savedPalettes');
            container.innerHTML = '';
            
            savedPalettesList.forEach((palette, index) => {
                const mini = document.createElement('div');
                mini.className = 'mini-palette';
                mini.onclick = () => {
                    currentPalette = [...palette];
                    document.getElementById('baseColor').value = palette[0];
                    displayPalette();
                };
                
                palette.forEach(color => {
                    const swatch = document.createElement('div');
                    swatch.className = 'mini-color';
                    swatch.style.backgroundColor = color;
                    mini.appendChild(swatch);
                });
                
                container.appendChild(mini);
            });
        }
        
        function exportPalette() {
            let css = ':root {\n';
            currentPalette.forEach((color, i) => {
                css += `  --color-${i + 1}: ${color};\n`;
            });
            css += '}';
            
            const blob = new Blob([css], { type: 'text/css' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'palette.css';
            a.click();
        }
        
        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1,3), 16) / 255;
            let g = parseInt(hex.slice(3,5), 16) / 255;
            let b = parseInt(hex.slice(5,7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch(max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }
        
        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            let c = (1 - Math.abs(2 * l - 1)) * s;
            let x = c * (1 - Math.abs((h / 60) % 2 - 1));
            let m = l - c / 2;
            let r, g, b;
            if (h < 60) { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else { r = c; g = 0; b = x; }
            r = Math.round((r + m) * 255);
            g = Math.round((g + m) * 255);
            b = Math.round((b + m) * 255);
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }
        
        // Initialize
        generatePalette();
        displaySavedPalettes();
    </script>
</body>
</html>
